version: "3.8"

services:
  web:
    container_name: ${APPLICATION_NAME}
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.local
    image: ${APPLICATION_NAME}-image
    command: pipenv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./:/usr/src/
    ports:
      - ${APP_PORT:-3002}:8000
    profiles:
      - local
      - test
    environment:
      # Database
      - DATABASE_USER
      - DATABASE_PASSWORD
      - DATABASE_NAME
      - DATABASE_PORT=5432
      - DATABASE_HOST=postgres

      # Database test
      - TEST_DATABASE_USER
      - TEST_DATABASE_PASSWORD
      - TEST_DATABASE_NAME
      - TEST_DATABASE_PORT=5432
      - TEST_DATABASE_HOST=postgres-test

      - ENVIRONMENT=${ENVIRONMENT}
      - SECURE_BODY_LOGGING
    networks:
      - default

  postgres:
    container_name: ${APPLICATION_NAME}-database
    platform: linux/amd64
    image: postgres:latest
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - local
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}

  postgres-test:
    container_name: ${APPLICATION_NAME}-database-test
    platform: linux/amd64
    image: postgres:latest
    restart: always
    profiles:
      - test
    environment:
      POSTGRES_DB: ${TEST_DATABASE_NAME}
      POSTGRES_USER: ${TEST_DATABASE_USER}
      POSTGRES_PASSWORD: ${TEST_DATABASE_PASSWORD}

volumes:
  pgdata:
